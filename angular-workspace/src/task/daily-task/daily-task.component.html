<div class="flex flex-col">
  <div class="flex justify-center">header</div>
  <div class="h-100 overflow-y-auto m-3 border-dotted border-1 rounded-md">
    <div *ngFor="let task of _taskService.dailyTask$ | async">
      <app-single-task [task]="task" />
    </div>
  </div>
  <button
    (click)="addTask()"
    mat-fab
    aria-label="Example icon button with a delete icon"
  >
    <mat-icon>add</mat-icon>
  </button>
  <div>{{ _taskService.animation$ | async }}</div>
  <div>
    <div class="flex justify-center">footer</div>
  </div>
</div>
