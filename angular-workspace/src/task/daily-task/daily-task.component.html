<div class="task-page">
  <section class="task-panel">
    <div class="task-panel-head">
      <div>
        <div class="task-panel-title-row">
          <h2 class="task-panel-title">Daily Tasks</h2>
          <ng-container *ngIf="!editingProjectDescription; else editProjectDescriptionTemplate">
            <button
              mat-icon-button
              class="project-edit-btn"
              (click)="startProjectDescriptionEdit()"
              aria-label="Edit project description"
            >
              <mat-icon fontIcon="edit"></mat-icon>
            </button>
          </ng-container>
          <ng-template #editProjectDescriptionTemplate>
            <button
              mat-icon-button
              class="project-save-btn"
              (click)="saveProjectDescription($event)"
              aria-label="Save project description"
            >
              <mat-icon fontIcon="check"></mat-icon>
            </button>
            <button
              mat-icon-button
              class="project-cancel-btn"
              (click)="cancelProjectDescriptionEdit($event)"
              aria-label="Cancel project description edit"
            >
              <mat-icon fontIcon="close"></mat-icon>
            </button>
          </ng-template>
        </div>

        <ng-container *ngIf="!editingProjectDescription; else projectDescriptionEditInput">
          <p class="task-panel-project-name">{{ activeTaskGroup?.taskGroupDescription || 'Project' }}</p>
        </ng-container>
        <ng-template #projectDescriptionEditInput>
          <input
            class="project-description-input"
            [value]="projectDescriptionDraft"
            (input)="projectDescriptionDraft = $any($event.target).value"
            (keydown.enter)="saveProjectDescription($event)"
            (keydown.escape)="cancelProjectDescriptionEdit($event)"
            aria-label="Project description"
          />
        </ng-template>

        <p class="task-panel-subtitle">
          {{ dailyTasks?.length ?? 0 }} task{{ (dailyTasks?.length ?? 0) === 1 ? '' : 's' }}
        </p>
      </div>

      <button (click)="addTask()" mat-flat-button color="primary" class="task-add-btn">
        <mat-icon fontIcon="add"></mat-icon>
        <span class="ml-1">New Task</span>
      </button>
    </div>

    <div class="task-list-wrap">
      <div *ngIf="dailyTasks?.length; else emptyState" class="task-list">
        <div *ngFor="let task of dailyTasks">
          <app-single-task [task]="task" />
        </div>
      </div>

      <ng-template #emptyState>
        <div class="task-empty">
          <div class="text-center">
            <p class="task-empty-title">No tasks yet</p>
            <p class="task-empty-copy">Create your first task to get started.</p>
          </div>
        </div>
      </ng-template>
    </div>

    <div class="task-panel-foot">
      Status: {{ _taskService.animation$ | async }}
    </div>
  </section>

  <aside class="task-detail-panel">
    <router-outlet></router-outlet>
  </aside>
</div>
