<article class="task-item" [class.is-complete]="!!task?.taskCompletedAtUtc">
  <mat-checkbox
    class="task-checkbox"
    (change)="updateTaskState($event)"
    [checked]="!!task?.taskCompletedAtUtc"
  ></mat-checkbox>

  <a class="task-main" [routerLink]="[task?.taskId]">
    <span class="task-kicker">Task #{{ task?.taskId }}</span>
    <span class="task-title">{{ task?.taskDescription || "Untitled task" }}</span>
  </a>

  <div class="task-actions">
    <span class="task-state" [class.done]="!!task?.taskCompletedAtUtc">
      {{ task?.taskCompletedAtUtc ? "Done" : "In progress" }}
    </span>

    <button class="task-delete" (click)="deleteTask()" mat-icon-button aria-label="Delete task">
      <mat-icon fontIcon="delete"></mat-icon>
    </button>
  </div>
</article>
