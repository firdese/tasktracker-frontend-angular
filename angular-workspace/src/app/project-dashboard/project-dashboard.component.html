<mat-sidenav-container class="h-[calc(100vh-64px)] overflow-hidden">
  <mat-sidenav #sidenav mode="side" [(opened)]="sidebarOpened" class="w-64 h-full p-4 flex flex-col overflow-hidden">
    <div class="pb-2 flex-shrink-0">
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-bold">Projects</h2>
        <button mat-icon-button (click)="sidebarOpened = false">
          <mat-icon>close</mat-icon>
        </button>
      </div>

      <div class="w-full">
        <button (click)="addProject()" mat-stroked-button class="w-full !justify-start">
          <mat-icon fontIcon="add"></mat-icon>
          <span class="ml-2">New Project</span>
        </button>
      </div>
    </div>

    <div class="flex-1 min-h-0 overflow-y-auto">
      <mat-nav-list class="project-list">
        <a
          mat-list-item
          class="project-list-item"
          *ngFor="let taskGroup of taskGroups"
          [routerLink]="[taskGroup.taskGroupId]"
          queryParamsHandling="preserve"
          routerLinkActive="is-active"
        >
          <span class="project-title">
            {{ taskGroup.taskGroupDescription }}
          </span>

          <button
            class="delete-btn"
            (click)="onProjectDeleteClicked(taskGroup); $event.stopPropagation(); $event.preventDefault();"
            mat-icon-button
            aria-label="Delete project"
          >
            <mat-icon fontIcon="delete"></mat-icon>
          </button>
        </a>
      </mat-nav-list>
    </div>
  </mat-sidenav>

  <mat-sidenav-content class="relative">
    <div class="h-full flex flex-col">
      <button
        *ngIf="!sidebarOpened"
        (click)="sidebarOpened = true"
        class="absolute left-3 top-1/2 z-10 flex h-10 w-10 -translate-y-1/2 items-center justify-center rounded-lg border border-slate-700/60 bg-slate-900/80 text-slate-200 shadow-md backdrop-blur-sm hover:bg-slate-800 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-400"
      >
        <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24"
          stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
      </button>

      <div *ngIf="!outlet.isActivated" class="flex flex-col items-center justify-center h-full text-center px-6">
        <h1 class="text-2xl font-semibold tracking-tight text-slate-100">Welcome to Task Tracker</h1>
        <p class="mt-2 text-sm text-slate-400">Select a project from the sidebar.</p>
      </div>
      <div class="flex-1 min-h-0">
        <router-outlet #outlet="outlet"></router-outlet>
      </div>
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
