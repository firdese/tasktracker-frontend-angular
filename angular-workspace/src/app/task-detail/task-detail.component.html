<ng-container *ngIf="taskDetail">
  <div class="grid grid-cols-2 gap-3 row items-center">
    <div>Task ID</div>
    <div>{{ taskDetail?.taskId }}</div>
    <div>Task Description</div>
    <div class="flex items-center">
      <mat-form-field>
        <input
          matInput
          type="text"
          [value]="taskDetail?.taskDescription"
          (change)="updateTaskDescription($event)"
        />
      </mat-form-field>
    </div>
  </div>
  <div class="flex justify-end mt-2">
    <button mat-icon-button (click)="onSaveDetail()">
      <mat-icon fontIcon="save"></mat-icon>
    </button>
  </div>
</ng-container>
